name: Build Executables

on:
  push:
    branches: [ master, macos ]
    tags:
      - 'v*'  # 匹配 v1.0.0, v2.0.0 等
  pull_request:
    branches: [ master ]
  workflow_dispatch:  # 允许手动触发构建

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows executable
        run: python build_exe.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-executable
          path: dist/媒体摘要PPT生成器.exe
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS executable
        run: python build_macos.py

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-executable
          path: dist/媒体摘要PPT生成器
          retention-days: 30

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-executable
          path: ./windows-executable

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-executable
          path: ./macos-executable

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            windows-executable/媒体摘要PPT生成器.exe
            macos-executable/媒体摘要PPT生成器
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
